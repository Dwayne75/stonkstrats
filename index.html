<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stonk Strats</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --sidebar: #0d1117;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #db6d28;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .sidebar-header {
    padding: 0 1.25rem 1.25rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }
  .sidebar-header h1 {
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .sidebar-header p {
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: 0.25rem;
  }
  .nav-section {
    padding: 0.5rem 1.25rem;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 1.25rem;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover {
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }
  .nav-item.active {
    color: var(--text);
    background: rgba(88,166,255,0.08);
    border-left-color: var(--accent);
  }
  .nav-item .icon { font-size: 1.1rem; width: 1.4rem; text-align: center; }
  .nav-item .badge {
    margin-left: auto;
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-weight: 600;
  }

  /* Content */
  .content {
    flex: 1;
    margin-left: 260px;
    max-width: 900px;
    padding: 2rem 2.5rem;
  }

  /* Mobile hamburger */
  .hamburger {
    display: none;
    position: fixed;
    top: 0.75rem;
    left: 0.75rem;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.6rem;
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
  }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
  }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .overlay.open { display: block; }
    .hamburger { display: block; }
    .content { margin-left: 0; padding: 3.5rem 1.25rem 2rem; }
  }

  /* Strategy page content styles */
  .content h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .content h2 { font-size: 1.5rem; margin: 2.5rem 0 1rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
  .content h3 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; }
  .content p { margin-bottom: 1rem; }
  .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem; }
  .callout {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    margin: 1.5rem 0;
    border-left: 4px solid var(--accent);
  }
  .callout.green { border-left-color: var(--green); }
  .callout.yellow { border-left-color: var(--yellow); }
  .callout.orange { border-left-color: var(--orange); }
  .callout .label { font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .callout.green .label { color: var(--green); }
  .callout.yellow .label { color: var(--yellow); }
  .callout.orange .label { color: var(--orange); }
  ul, ol { margin: 0.5rem 0 1rem 1.5rem; }
  li { margin-bottom: 0.4rem; }
  pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    overflow-x: auto;
    font-size: 0.85rem;
    line-height: 1.5;
    margin: 1rem 0;
  }
  code { font-family: 'SF Mono', 'Fira Code', Consolas, monospace; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.9rem;
  }
  th, td {
    padding: 0.6rem 0.8rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th { background: var(--surface); font-weight: 600; color: var(--accent); white-space: nowrap; }
  tr:hover td { background: rgba(88, 166, 255, 0.04); }
  .best td { font-weight: 600; color: var(--green); }
  img {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 1rem 0;
  }
  .faq-q { font-weight: 600; margin-top: 1.25rem; }
  .faq-a { color: var(--text-muted); margin-bottom: 1rem; }
  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2rem; height: 2rem;
    background: var(--accent);
    color: var(--bg);
    border-radius: 50%;
    font-weight: 700;
    font-size: 0.9rem;
    margin-right: 0.75rem;
    flex-shrink: 0;
  }
  .step { display: flex; align-items: flex-start; margin-bottom: 1.5rem; }
  .step-content { flex: 1; }
  .step-content h3 { margin-top: 0; }
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
    margin: 1rem 0;
  }
  .setting-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
  }
  .setting-card h4 { margin-bottom: 0.5rem; font-size: 1.1rem; }
  .setting-card .yield { font-size: 1.5rem; font-weight: 700; }
  .setting-card.aggressive .yield { color: var(--orange); }
  .setting-card.balanced .yield { color: var(--green); }
  .setting-card.conservative .yield { color: var(--accent); }
  .tag {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .tag.rec { background: rgba(63, 185, 80, 0.15); color: var(--green); }
  footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; }
  .toc { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem 1.5rem; margin: 1.5rem 0; }
  .toc ul { list-style: none; margin: 0; padding: 0; }
  .toc li { margin: 0.3rem 0; }
  .toc a { color: var(--accent); text-decoration: none; }
  .toc a:hover { text-decoration: underline; }
  a { color: var(--accent); }

  /* Home page */
  .home-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin: 1rem 0;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .home-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .home-card h3 { margin: 0 0 0.5rem; font-size: 1.2rem; }
  .home-card p { margin: 0; color: var(--text-muted); font-size: 0.9rem; }
  .home-card .stats { display: flex; gap: 1.5rem; margin-top: 0.75rem; font-size: 0.85rem; }
  .home-card .stat-val { font-weight: 700; }
  .home-card .stat-val.green { color: var(--green); }
  .home-card .stat-val.yellow { color: var(--yellow); }

  /* Loading */
  .loading { color: var(--text-muted); padding: 3rem; text-align: center; }
</style>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📈 Stonk Strats</h1>
    <p>Options strategy playbooks & backtests</p>
  </div>

  <div class="nav-section">Strategies</div>
  <a class="nav-item" data-page="home" onclick="navigate('home')">
    <span class="icon">🏠</span> Home
  </a>
  <a class="nav-item" data-page="call-spread" onclick="navigate('call-spread')">
    <span class="icon">📊</span> JEPI Call Spread
    <span class="badge">SPY</span>
  </a>

  <div class="nav-section" style="margin-top:1.5rem">Coming Soon</div>
  <a class="nav-item" style="opacity:0.4; pointer-events:none">
    <span class="icon">🎡</span> The Wheel
  </a>
  <a class="nav-item" style="opacity:0.4; pointer-events:none">
    <span class="icon">📉</span> RSI-Gated CC
  </a>
  <a class="nav-item" style="opacity:0.4; pointer-events:none">
    <span class="icon">🔀</span> Dual-Zone CC
  </a>
</nav>

<main class="content" id="content">
  <div class="loading">Loading...</div>
</main>

<script>
const pages = {};

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function navigate(page) {
  // Update URL hash
  history.pushState(null, '', page === 'home' ? '#' : '#' + page);
  loadPage(page);
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

async function loadPage(page) {
  const content = document.getElementById('content');
  
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  if (page === 'home') {
    content.innerHTML = getHomePage();
    return;
  }

  // Load from cache or fetch
  if (pages[page]) {
    content.innerHTML = pages[page];
    window.scrollTo(0, 0);
    return;
  }

  content.innerHTML = '<div class="loading">Loading strategy...</div>';

  try {
    const resp = await fetch('strategies/' + page + '.html');
    if (!resp.ok) throw new Error('Not found');
    const html = await resp.text();
    pages[page] = html;
    content.innerHTML = html;
    window.scrollTo(0, 0);
  } catch (e) {
    content.innerHTML = '<div class="loading">Strategy not found.</div>';
  }
}

function getHomePage() {
  return `
    <h1>📈 Stonk Strats</h1>
    <p class="subtitle">Options strategy playbooks backed by real market data. Pick a strategy to see the full breakdown.</p>

    <div class="home-card" onclick="navigate('call-spread')">
      <h3>📊 JEPI-Style Call Spread</h3>
      <p>Own shares + sell weekly OTM call spreads. Replicates JEPI/JEPQ income strategy with better tax treatment and zero fees.</p>
      <div class="stats">
        <div><span class="stat-val green">+78.5%</span><br>2yr return (balanced)</div>
        <div><span class="stat-val green">26.1%</span><br>ann. premium yield</div>
        <div><span class="stat-val yellow">-12.0%</span><br>max drawdown</div>
        <div><span class="stat-val">vs +41.2%</span><br>buy & hold</div>
      </div>
    </div>

    <div class="home-card" style="opacity:0.5; cursor:default">
      <h3>🎡 The Wheel</h3>
      <p>Sell puts until assigned, then sell calls until called away. Systematic income on stocks you want to own.</p>
      <div class="stats"><div style="color:var(--text-muted)">Coming soon</div></div>
    </div>

    <div class="home-card" style="opacity:0.5; cursor:default">
      <h3>📉 RSI-Gated Covered Calls</h3>
      <p>Only sell calls when RSI signals weakness. Preserves upside during momentum runs.</p>
      <div class="stats"><div style="color:var(--text-muted)">Coming soon</div></div>
    </div>

    <div class="home-card" style="opacity:0.5; cursor:default">
      <h3>🔀 Dual-Zone Covered Calls</h3>
      <p>ITM calls when bearish, OTM when neutral, nothing when bullish. Adaptive income strategy.</p>
      <div class="stats"><div style="color:var(--text-muted)">Coming soon</div></div>
    </div>

    <footer>
      <p>All backtests use real historical option prices from Polygon. Not financial advice — model it before you trade it.</p>
    </footer>
  `;
}

// Route on load
const hash = location.hash.replace('#', '') || 'home';
loadPage(hash);

// Handle back/forward
window.addEventListener('popstate', () => {
  const h = location.hash.replace('#', '') || 'home';
  loadPage(h);
});
</script>

</body>
</html>
